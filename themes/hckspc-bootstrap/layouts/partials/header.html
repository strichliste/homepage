<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · strichliste{{ end }}</title>
    {{ with or .Description .Site.Params.description }}<meta name="description" content="{{ . }}" />{{ end }}
    {{ with .OutputFormats.Get "rss" }}<link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}" />{{ end }}

    <link rel="icon" sizes="128x128" href="/img/common/logo-touch-icon.png" />

    <link href="/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/app.css" rel="stylesheet" />
    {{ partial "head_includes.html" . }}
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header class="header navbar container">
      <div class="navbar-left">
        <a class="logo" href="/">
          <img src="{{ .Site.Params.logo }}" alt="strichliste — home" width="251" height="35" />
        </a>
      </div>
      <nav class="navbar-right" aria-label="Main">
        {{ partial "menu.html" . }}
      </nav>
    </header>
    <main id="main" tabindex="-1">
