{{ partial "header.html" . }}
<div class="container">
    <div class="row content margin-bottom-20">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
        <ul>
        {{ range .Pages }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                {{ with .Description }}— {{ . }}{{ end }}
            </li>
        {{ end }}
        </ul>
    </div>
</div>
{{ partial "footer.html" . }}
